<link rel="stylesheet" href="/contact.css">
<section id="contact" class="contact">
    <div class="container">
      <!-- Section Title -->
      <h2 class="contact-title">GET IN TOUCH</h2>

      <!-- Contact Form -->
      <form class="contact-form" id="contactForm">
        <div class="form-row">
          <!-- Name -->
          <div class="form-group">
            <label class="form-label">NAME</label>
            <input type="text" name="name" class="form-input">
          </div>

          <!-- Email -->
          <div class="form-group">
            <label class="form-label">EMAIL*</label>
            <input type="email" name="email" class="form-input" required>
          </div>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label class="form-label">PHONE NUMBER</label>
          <input type="tel" name="phone" class="form-input">
        </div>

        <!-- Comment -->
        <div class="form-group">
          <label class="form-label">COMMENT</label>
          <textarea name="comment" rows="5" class="form-textarea"></textarea>
        </div>

        <!-- Submit Button -->
        <div class="form-submit">
          <button type="submit" class="btn-submit">SEND MESSAGE</button>
        </div>
      </form>

      <!-- Contact Information -->
      <div class="contact-info-section">
        <h3 class="contact-info-title">CONTACT US</h3>
        <p class="contact-info-subtitle">We'd Love to Hear From You</p>

        <div class="contact-info-grid">
          <div class="contact-info-card">
            <span class="contact-info-label">EMAIL</span>
            <p class="contact-info-text">queriesfeel@gmail.com</p>
          </div>
          <div class="contact-info-card">
            <span class="contact-info-label">MOBILE</span>
            <p class="contact-info-text"> +919960141496</p>
          </div>
          <div class="contact-info-card">
            <h4 class="contact-info-heading">ADDRESS</h4>
            <a href="https://www.google.com/maps/place/334,+Sachapir+St,+Camp,+Pune" target="_blank" class="contact-info-link">
              334, Sachapir St, Camp, Pune, Maharashtra 411001
            </a>
          </div>
          <div class="contact-info-card">
            <h4 class="contact-info-heading">TIMING</h4>
            <p class="contact-info-text">Mon - Sun: 10am to 8pm</p>
          </div>
        </div>
      </div>
    </div>
  </section>
